<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fluxos Rede Gazeta Audit Log</title>
  <link rel="stylesheet" href="/styles.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>
<body>
  <div class="app">
    <header class="app-header">
      <div class="header-left">
        <button id="btn-back" class="btn-back hidden">← Voltar</button>
        <div class="header-brand">
          <img src="/logo.png" alt="Time do Futuro" class="header-logo" />
          <h1 id="header-title">Fluxos Rede Gazeta Audit Log</h1>
        </div>
      </div>
      <div class="header-right">
        <span id="status-dot" class="dot dot-loading"></span>
        <span id="status-label">conectando...</span>
        <button id="btn-refresh" class="btn-refresh">↻ Atualizar</button>
      </div>
    </header>

    <div id="dashboard" class="dashboard hidden"></div>
    <main id="view" class="view"></main>
  </div>

  <script>
    let currentView = "channels";
    let currentChannel = null;
    let currentKey = null;

    const view = document.getElementById("view");
    const dashboard = document.getElementById("dashboard");
    const headerTitle = document.getElementById("header-title");
    const btnBack = document.getElementById("btn-back");
    const btnRefresh = document.getElementById("btn-refresh");
    const statusDot = document.getElementById("status-dot");
    const statusLabel = document.getElementById("status-label");

    // --- Utilitários ---
    function truncate(str, n = 40) {
      return str && str.length > n ? str.slice(0, n) + "…" : str;
    }

    function formatDateTime(iso) {
      if (!iso) return "-";
      const d = new Date(iso);
      return d.toLocaleDateString("pt-BR") + " " +
        d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" });
    }

    function formatDateShort(iso) {
      if (!iso) return "-";
      const d = new Date(typeof iso === "string" && iso.length === 10 ? iso + "T12:00:00" : iso);
      return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
    }

    function today() {
      return new Date().toISOString().slice(0, 10);
    }

    function setLoading() {
      view.innerHTML = '<div class="loading">Carregando...</div>';
    }

    // --- Health ---
    async function checkHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        const ok = data.status === "connected";
        statusDot.className = "dot " + (ok ? "dot-ok" : "dot-error");
        statusLabel.textContent = ok ? "conectado" : data.status;
      } catch {
        statusDot.className = "dot dot-error";
        statusLabel.textContent = "erro";
      }
    }

    // --- Dashboard ---
    function buildMetricCards(summary) {
      return `
        <div class="metric-cards">
          <div class="metric-card">
            <span class="metric-label">Conversas</span>
            <span class="metric-number">${summary.total_conversations}</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Mensagens</span>
            <span class="metric-number">${summary.total_messages}</span>
          </div>
          <div class="metric-card">
            <span class="metric-label">Média msgs/conv</span>
            <span class="metric-number">${summary.avg_messages_per_conv}</span>
          </div>
        </div>`;
    }

    function buildHeatmap(heatmapData) {
      const DAYS  = ["Dom", "Seg", "Ter", "Qua", "Qui", "Sex", "Sáb"];
      const grid  = {};
      let maxCount = 0;

      for (const { dow, hour, count } of heatmapData) {
        if (!grid[dow]) grid[dow] = {};
        grid[dow][hour] = count;
        if (count > maxCount) maxCount = count;
      }

      function intensity(count) {
        if (!count || maxCount === 0) return 0;
        const r = count / maxCount;
        if (r < 0.25) return 1;
        if (r < 0.5)  return 2;
        if (r < 0.75) return 3;
        return 4;
      }

      let html = '<div class="heatmap">';
      html += '<div class="heatmap-corner"></div>';
      for (let h = 0; h < 24; h++) {
        html += `<div class="heatmap-hour-label">${h}</div>`;
      }

      for (let d = 0; d < 7; d++) {
        html += `<div class="heatmap-day-label">${DAYS[d]}</div>`;
        for (let h = 0; h < 24; h++) {
          const count = (grid[d] && grid[d][h]) || 0;
          const i = intensity(count);
          html += `<div class="heatmap-cell" data-i="${i}" title="${DAYS[d]} ${h}h: ${count} msgs"></div>`;
        }
      }

      html += '</div>';
      return html;
    }

    async function loadDashboard(from, to, selectedChannel) {
      const f = from || today();
      const t = to   || today();
      const chParam = selectedChannel ? `&channel=${encodeURIComponent(selectedChannel)}` : "";

      // Fetch all three data sources in parallel
      const [statsRes, globalSummaryRes, filteredSummaryRes] = await Promise.all([
        fetch(`/api/stats/daily?from=${f}&to=${t}`),
        fetch(`/api/stats/summary?from=${f}&to=${t}`),
        fetch(`/api/stats/summary?from=${f}&to=${t}${chParam}`)
      ]);

      const { channels: allChannels } = await statsRes.json();
      const globalSummary             = await globalSummaryRes.json();
      const filteredSummary           = await filteredSummaryRes.json();

      // ── Today cards (always all channels) ──
      const todayCards = allChannels.map(ch => `
        <div class="today-card">
          <span class="today-card-label">${truncate(ch.name, 22)}</span>
          <span class="today-card-number">${ch.today}</span>
          <span class="today-card-sub">conversas hoje</span>
        </div>
      `).join("");

      // ── Channel dropdown ──
      const channelOptions = [
        `<option value="">Todos os chats</option>`,
        ...allChannels.map(ch =>
          `<option value="${encodeURIComponent(ch.name)}" ${selectedChannel === ch.name ? "selected" : ""}>${ch.name}</option>`
        )
      ].join("");

      // ── Day bars (filtered by channel) ──
      const filtered = selectedChannel
        ? allChannels.filter(ch => ch.name === selectedChannel)
        : allChannels;

      const totalFilter = filtered.reduce((s, ch) => s + ch.total, 0);
      const allDays = {};
      for (const ch of filtered) {
        for (const d of ch.days) {
          allDays[d.date] = (allDays[d.date] || 0) + d.count;
        }
      }
      const dayBars = Object.entries(allDays)
        .sort(([a], [b]) => a.localeCompare(b))
        .map(([date, count]) => `
          <div class="day-bar">
            <span class="day-bar-count">${count}</span>
            <span class="day-bar-date">${formatDateShort(date)}</span>
          </div>
        `).join("");

      // ── Render ──
      dashboard.innerHTML = `
        <!-- Global panel: all channels, follows date filter -->
        <div class="dash-global">
          <span class="dash-section-label">PERÍODO SELECIONADO — TODOS OS CHATS</span>
          ${buildMetricCards(globalSummary)}
          <span class="dash-section-label">HORÁRIOS DE MAIOR ATIVIDADE</span>
          <div class="heatmap-wrap">${buildHeatmap(globalSummary.heatmap)}</div>
        </div>

        <!-- Bottom row: today cards + filter panel -->
        <div class="dash-row2">
          <div class="dash-today">
            <span class="dash-section-label">HOJE</span>
            <div class="today-cards">${todayCards || '<span style="color:var(--muted);font-size:.9rem">Nenhuma conversa hoje.</span>'}</div>
          </div>

          <div class="dash-filter">
            <span class="dash-section-label">FILTRO DE DATAS</span>
            <div class="filter-controls">
              <label>Chat <select id="filter-channel" class="filter-select">${channelOptions}</select></label>
              <label>De <input type="date" id="filter-from" value="${f}" /></label>
              <label>Até <input type="date" id="filter-to" value="${t}" /></label>
              <button id="filter-apply" class="btn-filter">Filtrar</button>
            </div>

            ${totalFilter > 0 ? `
              <div class="filter-result">
                <span class="filter-total">Total: <strong>${totalFilter}</strong></span>
                <div class="day-bars">${dayBars}</div>
              </div>
            ` : '<div class="filter-empty">Nenhuma conversa no período.</div>'}

            <div style="margin-top:16px">
              <span class="dash-section-label">${selectedChannel ? truncate(selectedChannel, 30) : "TODOS OS CHATS"} — MÉTRICAS DO PERÍODO</span>
              ${buildMetricCards(filteredSummary)}
            </div>
          </div>
        </div>
      `;

      document.getElementById("filter-apply").addEventListener("click", () => {
        const f2 = document.getElementById("filter-from").value;
        const t2 = document.getElementById("filter-to").value;
        const ch = document.getElementById("filter-channel").value;
        loadDashboard(f2, t2, ch ? decodeURIComponent(ch) : null);
      });
    }

    // --- View: Canais ---
    async function showChannels() {
      currentView = "channels";
      currentChannel = null;
      currentKey = null;
      headerTitle.textContent = "Fluxos Rede Gazeta Audit Log";
      btnBack.classList.add("hidden");
      dashboard.classList.remove("hidden");
      setLoading();

      await loadDashboard();

      const res = await fetch("/api/channels");
      const { channels } = await res.json();

      if (!channels.length) {
        view.innerHTML = '<div class="empty">Nenhum canal encontrado.</div>';
        return;
      }

      view.innerHTML = channels.map(ch => `
        <div class="list-item" data-channel="${encodeURIComponent(ch.name)}">
          <div class="item-main">
            <span class="item-title">${ch.name}</span>
            <span class="item-meta">${ch.conversations} conversa${ch.conversations !== 1 ? "s" : ""} · última: ${formatDateTime(ch.lastUpdated)}</span>
          </div>
          <span class="item-arrow">›</span>
        </div>
      `).join("");

      view.querySelectorAll(".list-item").forEach(el => {
        el.addEventListener("click", () => {
          showConversations(decodeURIComponent(el.dataset.channel));
        });
      });
    }

    // --- View: Conversas ---
    async function showConversations(channel) {
      currentView = "conversations";
      currentChannel = channel;
      currentKey = null;
      headerTitle.textContent = truncate(channel, 50);
      btnBack.classList.remove("hidden");
      dashboard.classList.add("hidden");
      setLoading();

      const res = await fetch(`/api/channels/${encodeURIComponent(channel)}/conversations`);
      const { conversations } = await res.json();

      if (!conversations.length) {
        view.innerHTML = '<div class="empty">Nenhuma conversa encontrada.</div>';
        return;
      }

      view.innerHTML = conversations.map(conv => `
        <div class="list-item" data-key="${encodeURIComponent(conv.key)}">
          <div class="item-main">
            <span class="item-title item-mono">${truncate(conv.id, 36)}</span>
            <span class="item-meta">${conv.messages} mensagen${conv.messages !== 1 ? "s" : ""} · ${formatDateTime(conv.updatedAt)}</span>
          </div>
          <span class="item-arrow">›</span>
        </div>
      `).join("");

      view.querySelectorAll(".list-item").forEach(el => {
        el.addEventListener("click", () => {
          showMessages(decodeURIComponent(el.dataset.key));
        });
      });
    }

    // --- View: Mensagens ---
    async function showMessages(key) {
      currentView = "messages";
      currentKey = key;
      const shortId = key.split(":").pop();
      headerTitle.textContent = truncate(shortId, 36);
      btnBack.classList.remove("hidden");
      dashboard.classList.add("hidden");
      setLoading();

      const res = await fetch(`/api/messages?key=${encodeURIComponent(key)}`);
      const { messages } = await res.json();

      if (!messages.length) {
        view.innerHTML = '<div class="empty">Nenhuma mensagem nesta conversa.</div>';
        return;
      }

      const bubbles = messages.map(msg => {
        const html = formatMessageContent(msg.content);
        if (!html) return ""; // skip tool-only messages
        return `
          <div class="bubble bubble-${msg.type === "human" ? "human" : "ai"}">
            <div class="bubble-header">
              <span class="bubble-label">${msg.type === "human" ? "Humano" : "IA"}</span>
              <span class="bubble-time">${formatDateTime(msg.created_at)}</span>
            </div>
            <div class="bubble-content">${html}</div>
          </div>`;
      }).join("");
      view.innerHTML = `<div class="chat">${bubbles || '<div class="empty">Nenhuma mensagem de texto nesta conversa.</div>'}</div>`;
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    // Configure marked: GitHub-flavored markdown, line breaks
    marked.use({ gfm: true, breaks: true });

    // Remove ALL [Used tools: ...] blocks from anywhere in the message.
    // Uses bracket counting to handle nested JSON arrays/objects inside the block.
    function stripToolCalls(content) {
      let result = content;
      let idx;
      while ((idx = result.indexOf("[Used tools:")) >= 0) {
        let depth = 0, end = result.length - 1;
        for (let i = idx; i < result.length; i++) {
          if (result[i] === "[") depth++;
          else if (result[i] === "]") {
            depth--;
            if (depth === 0) { end = i; break; }
          }
        }
        result = (result.slice(0, idx) + result.slice(end + 1)).trim();
      }
      return result.trim();
    }

    // Returns rendered HTML string, or null if message has no displayable content
    function formatMessageContent(content) {
      const textPart = stripToolCalls(content || "");

      if (!textPart) return null; // nothing to show (tool-only message)

      // Pure JSON: pretty-print in a monospace block
      if (textPart.startsWith("{") || textPart.startsWith("[")) {
        try {
          const parsed = JSON.parse(textPart);
          return `<pre class="msg-json">${escapeHtml(JSON.stringify(parsed, null, 2))}</pre>`;
        } catch (_) { /* not valid JSON, fall through */ }
      }

      // Render as markdown
      return marked.parse(textPart);
    }

    // --- Navegação ---
    btnBack.addEventListener("click", () => {
      if (currentView === "messages") showConversations(currentChannel);
      else if (currentView === "conversations") showChannels();
    });

    btnRefresh.addEventListener("click", () => {
      if (currentView === "messages") showMessages(currentKey);
      else if (currentView === "conversations") showConversations(currentChannel);
      else showChannels();
    });

    // --- Init ---
    checkHealth();
    showChannels();
    setInterval(checkHealth, 15000);
  </script>
</body>
</html>
